<nav class="navbar navbar-expand-lg fixed-top"
  [ngClass]="isDarkMode ? 'navbar-dark' : 'navbar-light'"
  [style]="isDarkMode ? 'background-color: #101d23;' : 'background-color: #ffffff;'">
  <div class="container-fluid mx-5">
    <a class="navbar-brand d-flex align-items-center" routerLink="inicio">
      <img alt="Logo" class="me-2"  src="hospital-icon.png" width="40" />
      NovaSalud
    </a>
    <div class=" navbar-collapse" id="navbarNav">
      <div class="px-4">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="#">Registrar Citas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="#">Lista de Doctores</a>
          </li>
        </ul>
      </div>
    </div>
    <div class="d-flex align-items-center">
      <a class="btn btn-outline-primary me-2" href="#">Iniciar Sesión</a>
      <a class="btn btn-primary" href="#">Registrarse</a>
      <div class="d-flex align-items-center ms-2">
        <div class="form-check form-switch ms-2">
          <input class="form-check-input" id="darkModeSwitch" role="switch" type="checkbox" (click)="toggleDarkMode()" />
        </div>
        <label class="form-check-label" for="darkModeSwitch">
          <img id="icon" alt="Light Mode" [src]="isDarkMode ? 'sun-icon.png' : 'moon-icon.png'" width="30"
          [style]="isDarkMode ? 'filter: invert(1);' : ''"/>
        </label>
      </div>
    </div>
  </div>
</nav>
